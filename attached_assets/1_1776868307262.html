<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrueGigs User Information Redesign</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-200 flex justify-center h-screen font-sans pb-10 pt-10">

    <div class="w-full max-w-md bg-white h-full flex flex-col shadow-2xl rounded-3xl overflow-hidden border border-gray-300 relative">
        
        <header class="bg-[#006dd2] text-white pt-5 pb-4 px-4 flex flex-col shadow-md z-10 shrink-0">
            <div class="flex items-center justify-between mb-2">
                <button class="hover:bg-blue-700 p-2 rounded-full transition w-10 h-10 flex items-center justify-center">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <h1 class="text-lg font-bold tracking-wide">User Information</h1>
                <span class="text-sm font-bold bg-blue-800/50 px-3 py-1 rounded-full">1 / 5</span>
            </div>
            
            <div class="w-full bg-blue-800/40 rounded-full h-1.5 mt-2 overflow-hidden">
                <div class="bg-white h-1.5 rounded-full w-1/5 shadow-[0_0_10px_rgba(255,255,255,0.5)]"></div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-6 space-y-6 bg-gray-50/50">
            
            <div class="relative mt-2">
                <label class="absolute -top-2 left-3 bg-white px-1 text-xs font-bold text-[#006dd2] uppercase tracking-wide z-10 shadow-sm rounded">Email Address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                        <i class="fas fa-envelope"></i>
                    </div>
                    <input type="email" value="name@name.com" class="w-full bg-white border-2 border-[#006dd2] text-gray-900 text-sm rounded-xl focus:ring-0 focus:border-[#006dd2] transition block pl-11 p-3.5 relative z-0 font-medium shadow-sm">
                </div>
            </div>

            <hr class="border-gray-200">

            <div class="space-y-5">
                <div class="flex space-x-3">
                    <div class="relative flex-1">
                        <label class="absolute -top-2 left-3 bg-white px-1 text-xs font-bold text-gray-500 uppercase tracking-wide z-10">First Name</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                                <i class="far fa-user"></i>
                            </div>
                            <input type="text" value="John" class="w-full bg-white border-2 border-gray-300 text-gray-900 text-sm rounded-xl focus:ring-0 focus:border-[#006dd2] transition block pl-11 p-3.5 relative z-0 font-medium">
                        </div>
                    </div>
                    
                    <div class="relative w-20">
                        <label class="absolute -top-2 left-3 bg-white px-1 text-xs font-bold text-gray-500 uppercase tracking-wide z-10">MI</label>
                        <input type="text" placeholder="M" class="w-full bg-white border-2 border-gray-300 text-gray-900 text-sm rounded-xl focus:ring-0 focus:border-[#006dd2] transition block p-3.5 text-center relative z-0 font-medium">
                    </div>
                </div>

                <div class="relative">
                    <label class="absolute -top-2 left-3 bg-white px-1 text-xs font-bold text-gray-500 uppercase tracking-wide z-10">Last Name</label>
                    <input type="text" value="Doe" class="w-full bg-white border-2 border-gray-300 text-gray-900 text-sm rounded-xl focus:ring-0 focus:border-[#006dd2] transition block p-3.5 pl-4 relative z-0 font-medium">
                </div>
            </div>

            <hr class="border-gray-200">

            <div class="space-y-5 pb-4">
                <div class="relative">
                    <label class="absolute -top-2 left-3 bg-white px-1 text-xs font-bold text-gray-500 uppercase tracking-wide z-10">Cell #</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                            <i class="fas fa-mobile-alt"></i>
                        </div>
                        <input type="tel" value="(123) 456-7890" class="w-full bg-white border-2 border-gray-300 text-gray-900 text-sm rounded-xl focus:ring-0 focus:border-[#006dd2] transition block pl-11 p-3.5 relative z-0 font-medium">
                    </div>
                </div>

                <div class="relative">
                    <label class="absolute -top-2 left-3 bg-white px-1 text-xs font-bold text-gray-500 uppercase tracking-wide z-10">Zip Code</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                            <i class="fas fa-map-marker-alt"></i>
                        </div>
                        <input type="text" value="12345" class="w-full bg-white border-2 border-gray-300 text-gray-900 text-sm rounded-xl focus:ring-0 focus:border-[#006dd2] transition block pl-11 p-3.5 relative z-0 font-medium">
                    </div>
                </div>
            </div>

        </main>

        <footer class="bg-white p-4 border-t border-gray-200 shrink-0 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
            <button class="w-full bg-[#006dd2] text-white font-bold py-3.5 rounded-xl hover:bg-blue-700 transition shadow-md flex items-center justify-center space-x-2">
                <span>Continue</span>
                <i class="fas fa-arrow-right text-sm"></i>
            </button>
        </footer>
    </div>

</body>
</html>
