<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrueGigs Clock-In Modal Redesign</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-200 flex justify-center h-screen font-sans pb-10 pt-10">

    <div class="w-full max-w-md bg-gray-50 h-full flex flex-col shadow-2xl rounded-3xl overflow-hidden border border-gray-300 relative">
        
        <header class="bg-blue-600 text-white p-4 h-24">
            <h1 class="text-center text-xl font-bold tracking-wide">TrueGigs</h1>
        </header>
        
        <div class="p-4 space-y-4 opacity-40 blur-[1px]">
            <div class="h-32 bg-white rounded-xl shadow-sm border border-gray-200"></div>
            <div class="h-32 bg-white rounded-xl shadow-sm border border-gray-200"></div>
        </div>

        <div class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
            
            <div class="w-full bg-white rounded-2xl shadow-2xl overflow-hidden transform transition-all">
                
                <div class="flex justify-between items-center px-5 py-4 border-b border-gray-100 bg-gray-50/50">
                    <h2 class="text-lg font-bold text-gray-900">Ready to Clock In?</h2>
                    <button class="text-gray-400 hover:text-gray-700 hover:bg-gray-200 w-8 h-8 rounded-full flex items-center justify-center transition">
                        <i class="fas fa-times"></i>
                    </button>
                </div>

                <div class="p-5 space-y-4">
                    
                    <div class="bg-blue-50/50 rounded-xl p-4 border border-blue-100 space-y-3 text-sm">
                        <div class="flex items-center">
                            <div class="w-8 flex justify-center text-blue-500"><i class="fas fa-concierge-bell"></i></div>
                            <div class="flex flex-col ml-1">
                                <span class="text-xs font-bold text-gray-500 uppercase tracking-wide">Event</span>
                                <span class="font-bold text-gray-900">Lunch Service</span>
                            </div>
                        </div>

                        <div class="flex items-center">
                            <div class="w-8 flex justify-center text-blue-500"><i class="far fa-clock"></i></div>
                            <div class="flex flex-col ml-1">
                                <span class="text-xs font-bold text-gray-500 uppercase tracking-wide">Shift Time</span>
                                <span class="font-bold text-gray-900">12:03 PM - 8:00 PM</span>
                            </div>
                        </div>

                        <div class="flex items-center">
                            <div class="w-8 flex justify-center text-blue-500"><i class="fas fa-map-marker-alt"></i></div>
                            <div class="flex flex-col ml-1">
                                <span class="text-xs font-bold text-gray-500 uppercase tracking-wide">Location</span>
                                <span class="font-bold text-gray-900">Manhattan</span>
                            </div>
                        </div>
                    </div>

                    <div class="flex justify-between items-center px-2 pt-2">
                        <span class="text-sm font-medium text-gray-600">Total Time Logged:</span>
                        <span class="text-sm font-bold text-gray-900 bg-gray-100 px-3 py-1 rounded-lg">0.0 hours</span>
                    </div>

                </div>

                <div class="p-5 pt-0">
                    <button class="w-full bg-blue-600 text-white font-bold text-lg py-4 rounded-xl hover:bg-blue-700 transition shadow-lg shadow-blue-600/30 flex items-center justify-center space-x-2 relative overflow-hidden group">
                        <span class="absolute w-full h-full rounded-xl ring-4 ring-blue-400 opacity-0 group-hover:animate-pulse group-hover:opacity-50 transition-opacity"></span>
                        <i class="fas fa-stopwatch text-xl"></i>
                        <span>Clock In Now</span>
                    </button>
                    <p class="text-center text-xs text-gray-400 mt-3 flex items-center justify-center">
                        <i class="fas fa-location-arrow mr-1"></i> Location verified
                    </p>
                </div>

            </div>
            
        </div>
        </div>

</body>
</html>
