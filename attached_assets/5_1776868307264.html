<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrueGigs Sign In Redesign</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-200 flex justify-center h-screen font-sans pb-10 pt-10">

    <div class="w-full max-w-md bg-gray-50 h-full flex flex-col shadow-2xl rounded-3xl overflow-hidden relative">
        
        <div class="absolute top-0 left-0 w-full h-[45%] bg-blue-600 rounded-b-[3rem] z-0 shadow-inner"></div>

        <main class="flex-1 overflow-y-auto z-10 flex flex-col pt-12">
            
            <div class="flex flex-col items-center mb-8">
                <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center shadow-lg mb-4 border-4 border-blue-500/30">
                    <span class="text-3xl font-black tracking-tighter text-green-400 drop-shadow-sm">TG</span>
                </div>
                <h1 class="text-3xl font-bold text-white tracking-wide">TrueGigs</h1>
            </div>

            <div class="bg-white rounded-3xl shadow-xl p-8 mx-5 border border-gray-100">
                
                <div class="space-y-4 mb-6">
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-blue-500">
                            <i class="fas fa-envelope"></i>
                        </div>
                        <input type="email" placeholder="Email" class="w-full bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:bg-white transition block pl-11 p-3.5" required>
                    </div>

                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-blue-500">
                            <i class="fas fa-lock"></i>
                        </div>
                        <input type="password" placeholder="Password" class="w-full bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:bg-white transition block pl-11 pr-11 p-3.5" required>
                        <div class="absolute inset-y-0 right-0 pr-4 flex items-center cursor-pointer text-gray-400 hover:text-gray-600 transition">
                            <i class="fas fa-eye"></i>
                        </div>
                    </div>
                </div>

                <div class="flex space-x-3 mb-6">
                    <button class="flex-1 bg-blue-600 text-white font-bold text-base py-3.5 rounded-xl hover:bg-blue-700 transition shadow-md shadow-blue-600/20">
                        Sign In
                    </button>
                    <button class="w-14 bg-gray-50 border border-gray-200 text-gray-600 rounded-xl hover:bg-gray-100 hover:text-blue-600 transition shadow-sm flex items-center justify-center text-xl">
                        <i class="fas fa-fingerprint"></i>
                    </button>
                </div>

                <div class="text-center">
                    <a href="#" class="text-sm font-bold text-blue-600 hover:text-blue-800 transition">Forgot Password?</a>
                </div>
            </div>

            <div class="mt-auto pb-6 px-6 pt-8 flex flex-col items-center">
                <p class="text-sm text-gray-500 mb-1">Don't have an account?</p>
                <a href="#" class="text-base font-bold text-blue-600 hover:text-blue-800 transition mb-8">Register Now</a>
                
                <div class="flex justify-between w-full max-w-[200px] text-xs font-bold text-gray-400 uppercase tracking-wide">
                    <a href="#" class="hover:text-gray-600 transition">Privacy Policy</a>
                    <a href="#" class="hover:text-gray-600 transition">Terms of Service</a>
                </div>
            </div>

        </main>
    </div>

</body>
</html>
