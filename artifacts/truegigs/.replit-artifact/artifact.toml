kind = "web"
previewPath = "/"
title = "TrueGigs"
version = "1.0.0"
id = "artifacts/truegigs"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21361

[services.development]
run = "pnpm --filter @workspace/truegigs run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/truegigs", "run", "build" ]
publicDir = "artifacts/truegigs/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21361"
BASE_PATH = "/"
